<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACE SMASHER</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <div class="main-content">
            <div id="setupOverlay" class="setup-overlay">
                <div class="setup-card">
                    <h2>Setup Your Smash</h2>
                    <p class="setup-help">Upload a face and pick a tool. Skip both to use defaults.</p>

                    <div class="upload-section">
                        <label for="setupImageUpload" class="upload-btn">Upload Face</label>
                        <input type="file" id="setupImageUpload" accept="image/*">
                        <span id="setupFileName">No file selected (default face will be used)</span>
                    </div>

                    <div class="tool-section">
                        <span class="tool-label">Choose Tool:</span>
                        <div class="tool-buttons">
                            <button class="tool-btn selected" data-tool="punch">👊 Punch</button>
                            <button class="tool-btn" data-tool="slap">👋 Slap</button>
                            <button class="tool-btn" data-tool="hammer">🔨 Hammer</button>
                        </div>
                    </div>
                    <button id="toggleComedyBtn" class="commentary-toggle" type="button" role="switch" aria-checked="false">
                        <span class="toggle-track" aria-hidden="true">
                            <span class="toggle-knob"></span>
                        </span>
                        <span id="toggleComedyText" class="toggle-text">Commentary is off</span>
                    </button>

                    <button id="startGameBtn" class="start-btn">Start Smashing</button>

                </div>
            </div>

            <div id="gameplayArea" class="gameplay-area hidden">
                <h1>FACE SMASHER</h1>

                <div class="controls">
                    <span id="scoreLabel">Smashed: 0</span>

                    <div class="action-buttons">
                        <button id="resetScoreBtn">Reset Score</button>
                        <button id="resetSpeedBtn">Normal Speed</button>
                    </div>
                </div>

                <canvas id="gameCanvas" width="800" height="600"></canvas>

                <div id="commentaryStage" class="commentary-stage" aria-live="polite" aria-atomic="true">
                    <div id="commentaryBubble" class="commentary-bubble">
                        <span id="commentaryMessage">Ready for chaos.</span>
                    </div>
                    <div id="commentaryIcons" class="commentary-icons" aria-hidden="true"></div>
                </div>

                <p id="instructions">Ready to smash!</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
